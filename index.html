<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>架空の絵本棚</title>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Kaisei+Decol&family=Klee+One&family=Zen+Kurenaido&family=Yusei+Magic&family=Hachi+Maru+Pop&family=DotGothic16&family=Reggae+One&family=Rampart+One&family=New+Tegomin&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Klee One', sans-serif;
      background: #f5ece0;
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
    }
    h1 {
      text-align: center;
      color: #3a2008;
      font-size: 2rem;
      margin-bottom: 2rem;
      font-family: 'Kaisei Decol', serif;
    }
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 2rem;
    }
    .tag-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1.5px solid #c9a87a;
      background: #fff;
      color: #5a3a1a;
      font-size: 13px;
      cursor: pointer;
      font-family: 'Klee One', sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .tag-btn:hover { background: #f0dfc0; }
    .tag-btn.active { background: #7a4e20; color: #fde8c0; border-color: #7a4e20; }
    #count {
      text-align: center;
      color: #8a6a4a;
      font-size: 13px;
      margin-bottom: 1.5rem;
    }
    .shelf {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 6px;
      background: #b07838;
      border-left: 12px solid #8a5c28;
      border-right: 12px solid #8a5c28;
      padding: 12px 16px 0;
      margin-bottom: 16px;
      box-shadow: 0 6px 0 #6a3e10;
    }
    .book {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px 3px 3px 2px;
      cursor: default;
      transition: transform 0.15s;
      position: relative;
      border-left: 3px solid rgba(0,0,0,0.1);
    }
    .book:hover { transform: translateY(-10px); }
    .book span {
      writing-mode: vertical-lr;
      text-orientation: mixed;
      font-size: 10px;
      padding: 6px 3px;
      text-align: center;
      line-height: 1.3;
      overflow: hidden;
      max-height: 84px;
      word-break: break-all;
    }
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #3a2008;
      color: #fde8c0;
      font-size: 11px;
      padding: 5px 9px;
      border-radius: 6px;
      white-space: normal;
      z-index: 10;
      pointer-events: none;
      max-width: 180px;
      text-align: center;
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #3a2008;
    }
    .book:hover .tooltip { display: block; }
  </style>
</head>
<body>

<h1>架空の絵本棚</h1>

<div class="tags-wrap" id="tagsWrap"></div>
<div id="count"></div>
<div id="shelves"></div>

<script>
const FONTS = [
  "'Dela Gothic One'",
  "'Kaisei Decol'",
  "'Klee One'",
  "'Zen Kurenaido'",
  "'Yusei Magic'",
  "'Hachi Maru Pop'",
  "'DotGothic16'",
  "'Reggae One'",
  "'Rampart One'",
  "'New Tegomin'",
];

const COLORS = [
  ["#f0d8d8","#7a2a2a"],
  ["#d8ecd8","#2a5a2a"],
  ["#d8e4f0","#2a3a6a"],
  ["#f0e8d0","#6a4a10"],
  ["#e8d8f0","#4a2a6a"],
  ["#d8f0ec","#1a5a50"],
  ["#f0dcd8","#6a2a1a"],
  ["#e0ecd8","#3a5a20"],
  ["#d8e8f0","#1a4a6a"],
  ["#f0e0d8","#6a3a20"],
  ["#e8f0d8","#3a5a10"],
  ["#dcdaf0","#3a2a6a"],
  ["#f0ead8","#5a4010"],
  ["#d8f0e4","#1a5a3a"],
  ["#f0d8ec","#6a1a5a"],
  ["#e8ead8","#4a4a20"],
  ["#d8ecf0","#1a4a5a"],
  ["#f0d8e4","#6a1a3a"],
];

const BOOKS = [
  { title: "ねこはなぜ月をみるのか", tags: ["動物", "夜"] },
  { title: "おじいさんの地図には海がない", tags: ["家族", "冒険"] },
  { title: "くもがわらったひ", tags: ["自然", "空"] },
  { title: "とおくのとおくのだいこんばたけ", tags: ["食べ物", "自然"] },
  { title: "ふゆのはじまりはどこですか", tags: ["季節", "自然"] },
  { title: "むしのことばでおやすみなさい", tags: ["動物", "夜"] },
  { title: "りんごがひとつ宇宙にある", tags: ["宇宙", "食べ物"] },
  { title: "てんきのいい火曜日のこと", tags: ["日常"] },
  { title: "はっぱのうえのちいさなうた", tags: ["自然", "音楽"] },
  { title: "よるのでんしゃにのったきつね", tags: ["動物", "夜", "冒険"] },
  { title: "おひさまがかくれんぼした", tags: ["空", "季節"] },
  { title: "かわのそこにはなにがある", tags: ["自然", "冒険"] },
  { title: "まるいたまごのひみつ", tags: ["動物", "ふしぎ"] },
  { title: "こうもりのかさをかりました", tags: ["動物", "日常"] },
  { title: "なみのおとがきこえますか", tags: ["自然", "音楽"] },
  { title: "ゆきのなかのちいさなあかり", tags: ["季節", "夜"] },
  { title: "もりのはずれのだれかのくつ", tags: ["ふしぎ", "自然"] },
  { title: "つきよにおどるかかしたち", tags: ["夜", "ふしぎ"] },
];

let activeTag = null;

function allTags() {
  const set = new Set();
  set.add("すべて");
  BOOKS.forEach(b => b.tags.forEach(t => set.add(t)));
  return [...set];
}

function renderTags() {
  const wrap = document.getElementById('tagsWrap');
  wrap.innerHTML = '';
  allTags().forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-btn' + (tag === (activeTag || "すべて") ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => {
      activeTag = tag === "すべて" ? null : tag;
      renderTags();
      renderShelves();
    };
    wrap.appendChild(btn);
  });
}

function renderShelves() {
  const list = activeTag ? BOOKS.filter(b => b.tags.includes(activeTag)) : [...BOOKS];
  document.getElementById('count').textContent = list.length + ' 冊';

  const PER_ROW = 12;
  const wrap = document.getElementById('shelves');
  wrap.innerHTML = '';

  for (let i = 0; i < list.length; i += PER_ROW) {
    const row = list.slice(i, i + PER_ROW);
    const shelf = document.createElement('div');
    shelf.className = 'shelf';
    row.forEach((book, j) => {
      const idx = BOOKS.indexOf(book);
      const w = 34 + (idx * 7) % 26;
      const h = 78 + (idx * 11) % 26;
      const [bg, fg] = COLORS[idx % COLORS.length];
      const font = FONTS[idx % FONTS.length];
      const el = document.createElement('div');
      el.className = 'book';
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.style.background = bg;
      el.innerHTML = `<span style="color:${fg};font-family:${font}">${book.title}</span><div class="tooltip">${book.title}</div>`;
      shelf.appendChild(el);
    });
    wrap.appendChild(shelf);
  }
}

renderTags();
renderShelves();
</script>
</body>
</html>
